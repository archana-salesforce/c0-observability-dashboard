                title.includes("not found") ||
                bodyText.includes("requested url was not found") ||
                bodyText.includes("404");
              if (looksNotFound && localPageIndex < localPageCandidates.length - 1) {
                localPageIndex += 1;
                setFrameSrc();
                return;
              }
              if (looksNotFound && localPageIndex >= localPageCandidates.length - 1) {
                // Nothing else to try; show the frame so user can see the error content.
                frame.style.visibility = "visible";
                return;
              }
            } catch (_err) {
              // Ignore access issues and continue with current source.
              frame.style.visibility = "visible";
            }
            const syncFrameHeight = () => {
              try {
                const doc = frame.contentDocument;
                if (!doc) return;
                const bodyHeight = doc.body ? doc.body.scrollHeight : 0;
                const nextHeight = Math.max(vizHeight, doc.documentElement.scrollHeight, bodyHeight);
                frame.style.height = nextHeight + "px";
                slot.style.minHeight = nextHeight + "px";
              } catch (_err) {
                // Ignore iframe sizing restrictions if browser blocks access.
              }
            };
            syncFrameHeight();
            frame.style.visibility = "visible";
            [250, 800, 1500, 3000, 5000].forEach((delayMs) => {
              setTimeout(syncFrameHeight, delayMs);
            });
          });
          setFrameSrc();
          slot.appendChild(frame);
          return;
        }

        if (!src) {
          const placeholder = document.createElement("div");
          placeholder.className = "placeholder";
          placeholder.innerHTML =
            "Add a view slug (e.g. <code>MyView</code>) or full Tableau URL for <code>" +
            key +
            "</code> in <code>tableauEmbeds</code>. Slugs resolve against <code>TABLEAU_VIEWS_BASE</code>.";
          slot.appendChild(placeholder);
          return;
        }

        const overlays = customOverlaysByEmbedKey[key] || {};

        const viz = document.createElement("tableau-viz");
        /**
         * Tableau defaults device layout to the iframe's *smallest* dimension when `device` is omitted.
         * On macOS Chrome at non‑100% page zoom, a newly shown tab can report a wrong size at init, so
         * the wrong layout/scaling loads while host overlays follow normal CSS zoom (Embedding API docs).
         * `device="desktop"` pins the desktop workbook layout; `iframe-attr-loading="eager"` avoids the
         * default lazy load deferring init while the tab was `display:none`.
         */
        viz.setAttribute("device", "desktop");
        viz.setAttribute("iframe-attr-loading", "eager");
        viz.setAttribute("toolbar", "hidden");
        viz.setAttribute("hide-tabs", "");
        const zMount = getTableauPageZoomFactor();
        if (Math.abs(zMount - 1) >= 0.015) {
          viz.setAttribute("data-c0-zoom-bridge", "1");
        }
        applyFixedTableauEmbedBox(viz, vizHeight);

        viz.addEventListener("firstinteractive", async () => {
          slot.classList.remove("overlays-pending");
          positionQuickViewsUnderParent(currentQuickGroup || "overview");
          applyFixedTableauEmbedBox(viz, vizHeight);
          tryTableauVizResize(viz);
          if (overlays.metricPickers) {
            await applyAllMetricListParametersToViz(viz);
          }
          if (overlays.segmentFilter) renderSegmentFilter(slot, key, viz);
          if (overlays.chemistrySignificance) {
            renderChemistrySignificanceControl(slot, viz, key);
            await applyChemistrySigParameter(viz);
          }

          const snapScrollAfterViz = () => {
            engageScrollTopLock(1500);
            scrollHostPageToTop();
            requestAnimationFrame(() => {
              scrollHostPageToTop();
              requestAnimationFrame(scrollHostPageToTop);
            });
            [120, 400, 1000].forEach((ms) => setTimeout(scrollHostPageToTop, ms));
          };
          snapScrollAfterViz();
          syncTableauHostLayout();
          requestAnimationFrame(() => {
            syncTableauHostLayout();
            requestAnimationFrame(syncTableauHostLayout);
          });
          [120, 350, 700, 1400, 2800].forEach((ms) => setTimeout(syncTableauHostLayout, ms));
        });

        slot.appendChild(viz);
        // Host overlays mount immediately; `overlays-pending` keeps them non-interactive until `firstinteractive`.
        slot.classList.add("overlays-pending");
        if (overlays.metricPickers) renderFloatingMetricPicker(slot, key, viz);
        if (overlays.deepDiveButtons) renderDeepDiveButton(slot, key);
        if (overlays.segmentFilter) renderSegmentFilter(slot, key, null);
        if (overlays.chemistrySignificance) renderChemistrySignificanceControl(slot, null, key);
        if (key === "agentRubric") {
          applyAgentRubricLayoutFromState(slot, key);
          renderAgentRubricLayoutTool(slot, key);
          syncWebPropertyAgentOverlayVisibility(slot, key);
          syncAgentRubricInsightChrome(slot);
        }
        const layoutFixedTableau = () => {
          applyFixedTableauEmbedBox(viz, vizHeight);
          tryTableauVizResizeIfInteractive(viz);
        };
        const startTableauSrc = () => {
          if (!viz.isConnected) return;
          viz.setAttribute("src", buildTableauSrcWithHostContext(src));
          layoutFixedTableau();
          requestAnimationFrame(() => {
            layoutFixedTableau();
            requestAnimationFrame(layoutFixedTableau);
          });
        };
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            setTimeout(startTableauSrc, 48);
          });
        });
      }

      function showTab(tabId) {
        const defaultId = pages[0].id;
        const nextId = pages.some((p) => p.id === tabId) ? tabId : defaultId;
        const activePage = pages.find((p) => p.id === nextId);
        const activeGroup = activePage ? (activePage.getAttribute("data-embed-key") || "").replace(/[A-Z].*/, "") : "";
        const pageToGroup = {
          "agent-rubric": "overview",
          "overview-metric-chemistry": "overview",
          "overview-topic-diagnostics": "overview",
          "efficacy-response-quality": "efficacy",
          "efficacy-user-sentiment": "efficacy",
          "efficacy-topic-collision": "efficacy",
          "performance-latency": "performance",
          "engagement-flywheel": "engagement",
          "engagement-key-metrics": "engagement",
          "business-value-time-savings": "business-value",
          "innovation-lab-email-coach-api": "innovation-lab",
        };
        const selectedGroup = pageToGroup[nextId] || activeGroup;
        setQuickViewGroup(selectedGroup);

        refreshC0EmbedZoomRevision();

        pages.forEach((page) => {
          const active = page.id === nextId;
          page.classList.toggle("is-active", active);
          if (active) mountTableau(page);
        });

        try {
          localStorage.setItem(TAB_STORAGE_KEY, nextId);
        } catch (_err) {
          // Ignore storage write errors in restricted browser modes.
        }

        links.forEach((link) => {
          const hrefMatch = link.getAttribute("href") === "#" + nextId;
          const sameGroup = link.getAttribute("data-tab-group") === selectedGroup;
          const isMainTab = link.classList.contains("tab-link");
          if (isMainTab) {
            link.classList.toggle("is-active", hrefMatch || sameGroup);
          } else {
            link.classList.toggle("is-active", hrefMatch);
          }
          if (hrefMatch) link.setAttribute("aria-current", "page");
          else link.removeAttribute("aria-current");
        });

        scrollHostPageToTop();
        if (activePage && pageHasTableauEmbed(activePage)) {
          engageScrollTopLock(3500);
        }
        const tabLabel = dashboardCatalog.find((d) => d.id === nextId)?.label || nextId;
        document.title = "Customer Zero Observability — " + tabLabel;

        syncTableauHostLayout();
        requestAnimationFrame(() => syncTableauHostLayout());
        setTimeout(syncTableauHostLayout, 120);
        const sg = selectedGroup;
        [220, 550, 1400].forEach((ms) => {
          setTimeout(() => {
            positionQuickViewsUnderParent(sg);
            syncTableauHostLayout();
          }, ms);
        });
      }

      function getInitialTabId() {
        const hashId = window.location.hash.replace("#", "");
        if (hashId && pages.some((p) => p.id === hashId)) return hashId;
        try {
          const savedId = localStorage.getItem(TAB_STORAGE_KEY) || "";
          if (savedId && pages.some((p) => p.id === savedId)) return savedId;
        } catch (_err) {
          // Ignore storage read errors.
        }
        return pages[0]?.id || "";
      }

      function onRouteChange(useInitial = false) {
        const tabId = useInitial ? getInitialTabId() : window.location.hash.replace("#", "");
        showTab(tabId);
        if (tabId && window.location.hash.replace("#", "") !== tabId) {
          history.replaceState(null, "", "#" + tabId);
        }
      }

      try {
        if ("scrollRestoration" in history) {
          history.scrollRestoration = "manual";
        }
      } catch (_err) {
        /* ignore */
      }

      window.addEventListener("hashchange", () => onRouteChange(false));
      /** Bump `_c0_zt` immediately on zoom/window metrics change (debounced handler is too late for fast tab clicks). */
      function syncC0EmbedZoomRevisionNow() {
        initC0PageZoomBaselines();
        refreshC0EmbedZoomRevision();
      }
      window.addEventListener("resize", syncC0EmbedZoomRevisionNow);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncC0EmbedZoomRevisionNow);
      }
      window.addEventListener("resize", debouncedWindowOrViewportResize);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", debouncedWindowOrViewportResize);
      }
      refreshC0EmbedZoomRevision();
      requestAnimationFrame(() => {
        initC0PageZoomBaselines();
        if (!window.__c0PageZoomBaselines) {
          const iw = Math.max(1, window.innerWidth || 1);
          window.__c0PageZoomBaselines = {
            dpr: window.devicePixelRatio || 1,
            oi: (window.outerWidth || iw) / iw,
            vviw: 1,
          };
        }
        refreshC0EmbedZoomRevision();
        onRouteChange(true);
      });
    </script>
  </body>
</html>
