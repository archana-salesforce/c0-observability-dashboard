<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Zero Observability</title>
    <!--
      DEPLOY BUNDLE — publish every file below in the SAME directory as c0-observability.html (paths are ./relative).

      REQUIRED (UI breaks or shows obvious holes if missing):
      1. c0-observability.html — shell (this file).
      2. Header / chrome: ./sf logo.svg · ./det logo.svg · ./ds logo.svg · ./slack.svg · ./agentforce.png · ./data360.png · ./tableau.png
      2b. Agent Rubric AI narrative strip: ./llm-icon.png (parent card header beside “AI-Curated Performance Narrative”).
      3. Innovation Lab iframe: ./email_coach_v34_scrubbed.html (primary) and ./email_coach_v34.html (fallback if scrubbed 404s).
      4. Flywheel tab iframe: ./flywheel-v3.html · ./flywheel_agent_explorer_data.js · ./tableau.gslides.svg

      OPTIONAL (nice-to-have; shell has embedded JSON fallbacks for #1–2):
      • ./flywheel_agent_explorer_data.json — used when fetch works (HTTP); not required if only the .js bundle is shipped.
      • ./c0_agent_summaries.json · ./c0_agent_summaries_hover.json — merge over bundled <script type="application/json"> snapshots on Agent Rubric when fetch succeeds.

      NETWORK (not files; hosting must allow):
      • Tableau Embedding API: https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js
      • Tableau Cloud views: TABLEAU_VIEWS_BASE + tableauEmbeds slugs (authenticated embed per your site policy).
      • Flywheel page CDNs: jsDelivr echarts + d3 (inside flywheel-v3.html).

      NOT part of this static host bundle: theme-presets.json, rubric_d3_viz.html, Python/scripts, *.md, other legacy explorer HTML unless you link them elsewhere.
    -->
    <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
    <style>
      :root {
        --body-bg: #f3f3f3;
        --header-card: #302783;
        --tab: #4a3aa8;
        --tab-active: #2f1b95;
        --sf-blue: #00a1e0;
        --focus-ring: 0 0 0 2px rgba(0, 161, 224, 0.45);
        --ink: #ffffff;
        --ink-soft: rgba(255, 255, 255, 0.88);
        --header-scale: 1.2;
        --nav-font-size: calc(12px * var(--header-scale));
        --header-item-height: calc(42px * var(--header-scale));
        --pill-min-height: calc(26px * var(--header-scale));
        --pill-pad-y: calc(7px * var(--header-scale));
        --pill-pad-x: calc(12px * var(--header-scale));
        --pill-radius: calc(9px * var(--header-scale));
        --right-col-a-width: calc(56px * var(--header-scale));
        --right-col-a-offset: calc(8px * var(--header-scale));
        --nav-row-gap: calc(12px * var(--header-scale));
        --viz-width: 1600px;
        /** Native Tableau workbook size for every dashboard (matches Agent Rubric). */
        --viz-tableau-height: 2600px;
        --viz-default-height: 2200px;
        --app-top-pad: 12px;
        --top-mask-bg: #f3f3f3;
        /** Partner logos in header: square slots; Tableau slightly smaller. */
        --powered-by-logo-size: calc(30px * var(--header-scale));
        --powered-by-logo-tableau-size: calc(var(--powered-by-logo-size) - 3px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: var(--body-bg);
        color: var(--ink);
      }

      .app {
        width: 100%;
        max-width: calc(var(--viz-width) + 16px);
        margin: 0 auto;
        padding: var(--app-top-pad) 8px 4px;
      }

      .top-mask {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--app-top-pad);
        background: var(--top-mask-bg);
        z-index: 59;
        pointer-events: none;
      }

      .header {
        --header-pad-x: calc(10px * var(--header-scale));
        padding: calc(8px * var(--header-scale)) var(--header-pad-x) calc(8px * var(--header-scale));
        background: var(--header-card);
        border-radius: calc(12px * var(--header-scale));
        box-shadow:
          0 8px 20px rgba(20, 10, 60, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .header-shell {
        position: sticky;
        top: var(--app-top-pad);
        z-index: 60;
        background: var(--body-bg);
        padding-bottom: calc(6px * var(--header-scale));
        backdrop-filter: blur(2px);
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: calc(10px * var(--header-scale));
        margin-bottom: calc(4px * var(--header-scale));
      }

      .brand-tools {
        display: flex;
        align-items: center;
        gap: calc(10px * var(--header-scale));
        min-width: 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: calc(12px * var(--header-scale));
        min-width: 0;
      }

      .brand .sf {
        width: auto;
        height: calc(62px * var(--header-scale));
        padding: 5px;
        object-fit: contain;
      }

      .title {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        font-size: calc(34px * var(--header-scale));
        letter-spacing: 0.05em;
        color: #fff;
        font-weight: 500;
        line-height: 1;
        transform: none;
        text-shadow:
          0 1px 1px rgba(9, 5, 40, 0.28),
          0 0 10px rgba(170, 197, 255, 0.12);
      }

      .powered-by {
        display: flex;
        align-items: center;
        gap: calc(10px * var(--header-scale));
        margin-left: calc(28px * var(--header-scale) + 12px);
        flex-shrink: 0;
        transform: translateY(calc(3px * var(--header-scale)));
      }

      .powered-by__logos {
        display: flex;
        align-items: center;
        gap: calc(10px * var(--header-scale));
        transform: translateY(calc(-2px * var(--header-scale)));
      }

      .powered-by__label {
        display: inline-block;
        align-self: center;
        margin-right: calc(6px * var(--header-scale));
        /**
         * Avant Garde family (ITC / URW). No reliable free webfont in Google Fonts for this exact face;
         * Century Gothic is the usual system substitute. Add Adobe Fonts / self-host if you need a guaranteed match.
         */
        font-family:
          "ITC Avant Garde Gothic",
          "Avant Garde",
          "AvantGarde",
          "Century Gothic",
          "AppleGothic",
          "URW Gothic L",
          sans-serif;
        font-size: calc(16px * var(--header-scale));
        font-weight: 300;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.96);
        line-height: 1;
        white-space: nowrap;
      }

      .powered-by__logo {
        display: block;
        flex-shrink: 0;
        width: var(--powered-by-logo-size);
        height: var(--powered-by-logo-size);
        object-fit: contain;
        object-position: center;
        /** Soft cyan halo (follows PNG alpha); stacked blurs read like a diffuse backlight */
        filter:
          drop-shadow(0 0 calc(6px * var(--header-scale)) rgba(140, 235, 255, 0.55))
          drop-shadow(0 0 calc(14px * var(--header-scale)) rgba(80, 200, 255, 0.35))
          drop-shadow(0 0 calc(24px * var(--header-scale)) rgba(0, 161, 224, 0.2));
      }

      .powered-by__logo--tableau {
        width: var(--powered-by-logo-tableau-size);
        height: var(--powered-by-logo-tableau-size);
      }

      /** Faint hairline between partner logos only (shorter than logo box) */
      .powered-by__rule {
        width: 1px;
        align-self: center;
        height: calc(18px * var(--header-scale));
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.14);
        box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.06);
      }

      .right-logos {
        display: grid;
        grid-template-columns: var(--right-col-a-width) auto;
        align-items: center;
        gap: calc(10px * var(--header-scale));
        justify-content: end;
      }

      .right-logos .ds {
        width: calc(118px * var(--header-scale));
        height: var(--header-item-height);
        object-fit: contain;
      }

      .right-logos .det {
        height: var(--header-item-height);
        width: auto;
        object-fit: contain;
        justify-self: center;
        transform: translateX(var(--right-col-a-offset));
      }

      .nav-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: var(--nav-row-gap);
      }

      .subnav-row {
        --subnav-offset: calc(100px * var(--header-scale));
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: calc(10px * var(--header-scale));
        margin-left: var(--subnav-offset);
        margin-top: calc(10px * var(--header-scale));
        padding-left: calc(30px * var(--header-scale));
        padding-right: max(0px, calc(var(--header-pad-x) - 8px));
        width: fit-content;
        max-width: calc(100% - var(--subnav-offset) - 8px);
        box-sizing: border-box;
        position: relative;
        opacity: 1;
        transform: translateY(0);
        transition: opacity 170ms ease, transform 170ms ease, margin-left 190ms ease;
      }

      .subnav-row__quick {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: calc(7px * var(--header-scale));
        min-width: 0;
      }

      .subnav-row::before {
        content: "";
        position: absolute;
        left: calc(10px * var(--header-scale));
        top: calc(-8px * var(--header-scale));
        width: calc(12px * var(--header-scale));
        height: calc(50% + calc(8px * var(--header-scale)));
        border-left: 2px solid rgba(255, 255, 255, 0.4);
        border-bottom: 2px solid rgba(255, 255, 255, 0.4);
        border-bottom-left-radius: calc(5px * var(--header-scale));
        pointer-events: none;
      }

      .subnav-row.is-switching {
        opacity: 0.62;
        transform: translateY(1px);
      }

      .right-actions {
        display: grid;
        grid-template-columns: var(--right-col-a-width) auto;
        align-items: center;
        gap: calc(8px * var(--header-scale));
        justify-content: end;
        margin-left: auto;
      }

      /**
       * Author `display` on these nodes wins over the UA `hidden` stylesheet rule;
       * force off when `[hidden]` so gated web-property agents fully hide overlays.
       */
      .metric-float-panel[hidden],
      .deep-dive-btn[hidden] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      .metric-float-panel {
        position: absolute;
        left: 18px;
        top: 220px;
        z-index: 8;
        display: grid;
        gap: 8px;
        align-content: start;
        min-width: 260px;
        min-height: 15px;
        border: 1px solid rgba(83, 95, 129, 0.24);
        border-radius: calc(8px * var(--header-scale));
        background: rgba(248, 250, 255, 0.95);
        padding: calc(10px * var(--header-scale));
        box-shadow: 0 2px 8px rgba(42, 56, 95, 0.1);
      }

      .metric-float-title {
        font-size: calc(12px * var(--header-scale));
        color: rgba(39, 48, 78, 0.92);
        letter-spacing: 0.02em;
        font-weight: 700;
        margin-bottom: calc(4px * var(--header-scale));
      }

      .metric-float-options {
        display: grid;
        gap: calc(5px * var(--header-scale));
        padding-inline-end: calc(6px * var(--header-scale));
        min-height: 0;
        max-height: var(
          --metric-float-options-max-height,
          calc(
            5 * (2px + 2 * (7px * var(--header-scale)) + (12px * var(--header-scale) * 1.2)) + 4 * (5px * var(--header-scale))
          )
        );
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-gutter: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(72, 88, 130, 0.28) transparent;
      }

      .metric-float-options::-webkit-scrollbar {
        width: calc(7px * var(--header-scale));
      }

      .metric-float-options::-webkit-scrollbar-track {
        background: transparent;
        box-shadow: none;
      }

      .metric-float-options::-webkit-scrollbar-thumb {
        border-radius: calc(10px * var(--header-scale));
        border: calc(2px * var(--header-scale)) solid transparent;
        background-clip: padding-box;
        background: rgba(72, 88, 130, 0.22);
        box-shadow: none;
      }

      .metric-float-options::-webkit-scrollbar-thumb:hover {
        background: rgba(72, 88, 130, 0.36);
      }

      .metric-float-option {
        text-align: left;
        border: 1px solid rgba(95, 107, 142, 0.2);
        border-radius: calc(6px * var(--header-scale));
        background: rgba(255, 255, 255, 0.9);
        color: rgba(44, 53, 83, 0.94);
        font-size: calc(12px * var(--header-scale));
        line-height: 1.2;
        padding: calc(7px * var(--header-scale)) calc(10px * var(--header-scale));
        cursor: pointer;
        transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
      }

      .metric-float-option:hover {
        background: rgba(245, 248, 255, 0.98);
        border-color: rgba(95, 107, 142, 0.34);
        transform: translateY(-1px);
      }

      .metric-float-option.is-active {
        border-color: rgba(43, 122, 212, 0.58);
        background: rgba(43, 122, 212, 0.14);
        color: rgba(28, 79, 146, 0.96);
      }

      .metric-float-option:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .chemistry-sig-float-panel {
        position: absolute;
        z-index: 8;
        display: flex;
        flex-direction: column;
        gap: 0;
        min-width: 480px;
        max-width: 920px;
        border: 1px solid rgba(178, 186, 203, 0.72);
        border-radius: calc(12px * var(--header-scale));
        background: rgba(241, 244, 249, 0.96);
        padding: calc(6px * var(--header-scale));
        box-shadow: 0 1px 2px rgba(42, 56, 95, 0.08);
      }

      .chemistry-sig-float-options {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: calc(10px * var(--header-scale));
        align-items: stretch;
      }

      .chemistry-sig-float-options .metric-float-option {
        flex: 1 1 0;
        min-width: 0;
        text-align: center;
        font-size: calc(11px * var(--header-scale));
        font-weight: 400;
        line-height: 1.15;
        padding: calc(6px * var(--header-scale)) calc(12px * var(--header-scale));
        border-radius: calc(10px * var(--header-scale));
        border-color: rgba(198, 204, 217, 0.9);
        background: rgba(255, 255, 255, 0.9);
        color: rgba(60, 67, 87, 0.92);
      }

      .chemistry-sig-float-options .metric-float-option:hover {
        background: rgba(252, 253, 255, 0.98);
        border-color: rgba(174, 184, 203, 0.94);
      }

      .chemistry-sig-float-options .metric-float-option.is-active {
        border-color: rgba(126, 166, 220, 0.95);
        background: linear-gradient(180deg, rgba(207, 223, 244, 0.94) 0%, rgba(191, 212, 241, 0.94) 100%);
        color: rgba(38, 75, 127, 0.96);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.58),
          0 1px 2px rgba(101, 132, 190, 0.24);
      }

      .chemistry-sig-layout-tool {
        position: absolute;
        right: 12px;
        top: 12px;
        z-index: 12;
        width: min(300px, calc(100% - 24px));
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(83, 95, 129, 0.28);
        background: rgba(255, 255, 255, 0.97);
        box-shadow: 0 8px 24px rgba(42, 56, 95, 0.16);
        font-size: 11px;
        color: rgba(39, 48, 78, 0.92);
      }

      .chemistry-sig-layout-tool__title {
        font-weight: 700;
        letter-spacing: 0.02em;
        margin-bottom: 8px;
      }

      .chemistry-sig-layout-tool__row {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 4px 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .chemistry-sig-layout-tool__row > span {
        grid-column: 1 / -1;
      }

      .chemistry-sig-layout-tool__num {
        width: 64px;
        padding: 4px 6px;
        border: 1px solid rgba(95, 107, 142, 0.25);
        border-radius: 4px;
        font-size: 11px;
      }

      .chemistry-sig-layout-tool__range {
        grid-column: 1 / -1;
        width: 100%;
      }

      .chemistry-sig-layout-tool__readout {
        margin: 8px 0 0;
        padding: 8px;
        border-radius: 6px;
        background: rgba(245, 248, 255, 0.95);
        border: 1px solid rgba(95, 107, 142, 0.15);
        font-size: 10px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 100px;
        overflow: auto;
      }

      .chemistry-sig-layout-tool__hint {
        margin-top: 8px;
        font-size: 10px;
        line-height: 1.35;
        color: rgba(39, 48, 78, 0.72);
      }

      .agent-rubric-layout-tool.chemistry-sig-layout-tool {
        left: 12px;
        right: auto;
        top: auto;
        bottom: 12px;
        max-height: min(480px, 52vh);
        overflow-y: auto;
      }

      .tableau-slot.overlays-pending .agent-rubric-layout-tool.chemistry-sig-layout-tool {
        opacity: 1;
        pointer-events: auto;
      }

      .segment-float-panel {
        position: absolute;
        left: 1px;
        top: 20px;
        z-index: 8;
        display: grid;
        gap: 8px;
        min-width: 375px;
        max-width: 375px;
        border: 1px solid rgba(83, 95, 129, 0.24);
        border-radius: calc(8px * var(--header-scale));
        background: rgba(248, 250, 255, 0.95);
        padding: calc(10px * var(--header-scale));
        box-shadow: 8px 8px 18px rgba(42, 56, 95, 0.14);
        overflow: visible;
      }

      .segment-float-title-row {
        display: flex;
        align-items: center;
        gap: calc(6px * var(--header-scale));
        min-width: 0;
      }

      .segment-float-title {
        display: block;
        flex: 1;
        min-width: 0;
        margin: 0;
        font-size: calc(12px * var(--header-scale));
        color: rgba(39, 48, 78, 0.92);
        letter-spacing: 0.02em;
        font-weight: 700;
        cursor: default;
      }

      .segment-float-subtitle {
        margin: 0;
        grid-column: 1 / -1;
        font-size: calc(11px * var(--header-scale));
        font-weight: 400;
        line-height: 1.45;
        letter-spacing: 0.01em;
        color: rgba(64, 76, 108, 0.82);
      }

      .segment-float-info {
        position: relative;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: calc(2px * var(--header-scale));
        border: none;
        border-radius: calc(4px * var(--header-scale));
        background: transparent;
        color: rgba(72, 86, 122, 0.75);
        cursor: help;
        line-height: 0;
        appearance: none;
        -webkit-appearance: none;
        transition: color 120ms ease, background 120ms ease;
      }

      .segment-float-info:hover {
        color: rgba(0, 97, 153, 0.95);
        background: rgba(0, 161, 224, 0.1);
      }

      /** Native `title` on `<button>` is often suppressed; use an in-DOM tooltip (hover + focus). */
      .segment-float-info__tooltip {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        bottom: auto;
        left: auto;
        width: max-content;
        max-width: min(320px, calc(100vw - 24px));
        padding: calc(10px * var(--header-scale)) calc(12px * var(--header-scale));
        border-radius: calc(8px * var(--header-scale));
        border: 1px solid rgba(83, 95, 129, 0.22);
        background: #fff;
        color: rgba(28, 35, 58, 0.96);
        font-size: calc(11px * var(--header-scale));
        line-height: 1.45;
        font-weight: 400;
        text-align: left;
        box-shadow: 0 8px 24px rgba(42, 56, 95, 0.2);
        z-index: 40;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.12s ease, visibility 0.12s ease;
      }

      .segment-float-info:hover .segment-float-info__tooltip,
      .segment-float-info:focus-visible .segment-float-info__tooltip {
        opacity: 1;
        visibility: visible;
      }

      .segment-float-select {
        width: 100%;
        max-width: 100%;
        border: 1px solid rgba(95, 107, 142, 0.2);
        border-radius: calc(6px * var(--header-scale));
        background: rgba(255, 255, 255, 0.9);
        color: rgba(44, 53, 83, 0.94);
        font-size: calc(12px * var(--header-scale));
        line-height: 1.2;
        padding: calc(7px * var(--header-scale)) calc(10px * var(--header-scale));
        cursor: pointer;
        outline: none;
      }

      .segment-float-select:focus {
        border-color: rgba(95, 107, 142, 0.34);
        box-shadow: 0 0 0 2px rgba(0, 161, 224, 0.22);
      }

      .segment-float-select option {
        color: #1d2442;
      }

      .segment-float-status {
        font-size: calc(11px * var(--header-scale));
        color: rgba(64, 76, 108, 0.82);
      }

      /**
       * Agent Rubric — insight rail (absolutely positioned; agent dropdown stays on `segmentPanelPosition`).
       * Outer `.agent-summary-rail__shell` wraps Key strengths / Needs attention with “AI-Curated Performance Narrative” header + llm-icon.
       * Inner cards mirror flywheel-v3 `.narrative-card` sizing; titles stay explicit (🚀 Key Strengths / ! Needs Attention).
       */
      .agent-summary-rail {
        position: absolute;
        z-index: 9;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        box-shadow: none;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        /**
         * Must not pair overflow-x: hidden with overflow-y: visible — spec forces overflow-y to `auto`,
         * which always creates a vertical scrollport on the rail (even when narrative fits).
         */
        overflow: visible;
      }

      .agent-summary-rail__shell {
        width: 100%;
        box-sizing: border-box;
        background: rgba(248, 250, 255, 0.95);
        border: 1px solid rgba(83, 95, 129, 0.24);
        border-radius: calc(8px * var(--header-scale));
        padding: calc(10px * var(--header-scale)) calc(12px * var(--header-scale)) calc(12px * var(--header-scale));
        box-shadow: 0 2px 8px rgba(42, 56, 95, 0.1);
        font-family: Inter, Arial, sans-serif;
      }

      .agent-summary-rail__header {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: calc(10px * var(--header-scale));
        margin-bottom: calc(10px * var(--header-scale));
      }

      /**
       * llm-icon.png — compact wide mark (e.g. 96×54); scale by height so it aligns with the title block, preserve aspect ratio.
       */
      .agent-summary-rail__icon-wrap {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: center;
        line-height: 0;
      }

      .agent-summary-rail__icon {
        display: block;
        height: calc(22px * var(--header-scale));
        width: auto;
        aspect-ratio: 96 / 54;
        object-fit: contain;
        object-position: center;
      }

      .agent-summary-rail__title-group {
        flex: 1;
        min-width: 0;
      }

      .agent-summary-rail__heading {
        font-size: calc(14px * var(--header-scale));
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: 0.02em;
        color: rgba(39, 48, 78, 0.92);
        margin: 0;
      }

      .agent-summary-rail__body {
        display: flex;
        flex-direction: column;
        gap: 0;
        min-width: 0;
      }

      .agent-summary-rail__body > .agent-summary-rail__state {
        margin: 0;
        padding: 4px 0 0;
        background: transparent;
        border: none;
        box-shadow: none;
        color: rgba(39, 48, 78, 0.88);
      }

      .agent-summary-rail__row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 14px;
        flex: 1 1 auto;
        min-width: 0;
        width: 100%;
      }

      .agent-narrative-card {
        flex: 1 1 0;
        min-width: 0;
        width: auto;
        border-radius: 12px;
        padding: 14px 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: #ffffff;
        box-shadow: none;
        box-sizing: border-box;
        overflow: visible;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /** Styled popover shown on card hover/focus. Populated from c0_agent_summaries_hover.json. */
      .agent-narrative-card__tooltip {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 60;
        padding: 10px 12px;
        border-radius: 8px;
        background: #0f1a2e;
        color: #f4f6fb;
        font-size: 13px;
        line-height: 1.45;
        letter-spacing: -0.005em;
        box-shadow: 0 10px 28px rgba(8, 15, 30, 0.22);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-4px);
        transition: opacity 0.12s ease, transform 0.12s ease;
        max-width: 560px;
      }

      .agent-narrative-card__tooltip::before {
        content: "";
        position: absolute;
        top: -6px;
        left: 20px;
        border: 6px solid transparent;
        border-bottom-color: #0f1a2e;
        border-top: 0;
      }

      .agent-narrative-card[data-has-hover="true"] {
        cursor: help;
      }

      .agent-narrative-card[data-has-hover="true"]:hover .agent-narrative-card__tooltip,
      .agent-narrative-card[data-has-hover="true"]:focus-within .agent-narrative-card__tooltip {
        opacity: 1;
        transform: translateY(0);
      }

      .agent-narrative-card__title {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 0 0 8px;
        padding: 0;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.2;
        letter-spacing: -0.01em;
        color: #101010;
      }

      .agent-narrative-card__title--strengths {
        color: #0b5cab;
      }

      .agent-narrative-card__title--attention {
        color: #8c3558;
      }

      .agent-narrative-card__title-ico {
        flex-shrink: 0;
        font-size: 15px;
        line-height: 1;
      }

      /** Red exclamation badge (avoid relying on emoji color across browsers). */
      .agent-narrative-card__title-ico--bang {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #e0324a;
        color: #fff;
        font-size: 10px;
        font-weight: 900;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .agent-narrative-card ul {
        flex: 0 0 auto;
        margin: 0;
        padding-left: 18px;
        color: #151515;
        font-size: 15px;
        line-height: 1.45;
        letter-spacing: -0.01em;
        overflow: visible;
      }

      .agent-narrative-card li {
        margin-bottom: 4px;
      }

      .agent-narrative-card--strengths {
        background: linear-gradient(165deg, #f0f7fd 0%, #e8f2fb 48%, #ffffff 100%);
        border: 1px solid rgba(1, 118, 211, 0.22);
        border-left-width: 4px;
        border-left-color: rgba(1, 118, 211, 0.7);
        box-shadow: none;
      }

      .agent-narrative-card--strengths.empty ul {
        color: #706b85;
        font-style: italic;
      }

      .agent-narrative-card--strengths.empty .agent-narrative-card__title--strengths {
        color: #1565ad;
      }

      .agent-narrative-card--attention {
        background: linear-gradient(165deg, #fdf5f8 0%, #faf6f8 45%, #ffffff 100%);
        border: 1px solid rgba(242, 90, 140, 0.28);
        border-left-width: 4px;
        border-left-color: rgba(230, 72, 118, 0.72);
        box-shadow: none;
      }

      .agent-narrative-card--attention.empty ul {
        color: #706b85;
        font-style: italic;
      }

      .agent-narrative-card--attention.empty .agent-narrative-card__title--attention {
        color: #7a4a5e;
      }

      /** One card when the JSON bundle only has generic “not populated yet” lines (avoids duplicating the same bullet in strengths + attention). */
      .agent-narrative-card--pending-only {
        flex: 1 1 100%;
        max-width: 100%;
        border-radius: 12px;
        padding: 14px 16px;
        border: 1px solid rgba(83, 95, 129, 0.22);
        border-left-width: 4px;
        border-left-color: rgba(83, 95, 129, 0.45);
        background: linear-gradient(165deg, #f7f8fc 0%, #fafbfd 45%, #ffffff 100%);
        box-shadow: none;
        box-sizing: border-box;
      }

      .agent-narrative-card--pending-only p {
        margin: 0;
        color: #2e3650;
        font-size: 15px;
        line-height: 1.45;
        letter-spacing: -0.01em;
      }

      .agent-summary-rail__state {
        margin: 0;
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.4;
        color: rgba(39, 48, 78, 0.88);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        border: 1px solid rgba(83, 95, 129, 0.2);
      }

      /** Agent Rubric — layout menu for the AI insight banner only (top-right of viz slot; see `AGENT_INSIGHT_LAYOUT_TOOL_ENABLED`). */
      .agent-insight-layout-tool {
        position: absolute;
        top: 10px;
        right: 10px;
        bottom: auto;
        z-index: 14;
        width: min(320px, calc(100% - 20px));
        max-height: min(52vh, 480px);
        overflow: auto;
        padding: 8px 10px 10px;
        border-radius: 8px;
        border: 1px solid rgba(83, 95, 129, 0.28);
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 8px 24px rgba(42, 56, 95, 0.18);
        font-size: 11px;
        color: rgba(39, 48, 78, 0.92);
      }

      .agent-insight-layout-tool > summary {
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.02em;
        list-style: none;
        margin: 0 0 6px;
        padding: 2px 0;
      }

      .agent-insight-layout-tool > summary::-webkit-details-marker {
        display: none;
      }

      .agent-insight-layout-tool__body {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .agent-insight-layout-tool__row {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 4px 8px;
        align-items: center;
        margin: 0;
      }

      .agent-insight-layout-tool__row > span {
        grid-column: 1 / -1;
        font-size: 10px;
        font-weight: 600;
        color: rgba(39, 48, 78, 0.78);
      }

      .agent-insight-layout-tool__num {
        width: 64px;
        padding: 4px 6px;
        border: 1px solid rgba(95, 107, 142, 0.25);
        border-radius: 4px;
        font-size: 11px;
      }

      .agent-insight-layout-tool__range {
        grid-column: 1 / -1;
        width: 100%;
      }

      .agent-insight-layout-tool__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }

      .agent-insight-layout-tool__btn {
        padding: 5px 10px;
        border-radius: 6px;
        border: 1px solid rgba(95, 107, 142, 0.28);
        background: rgba(248, 250, 255, 0.95);
        font-size: 10px;
        font-weight: 600;
        color: rgba(39, 48, 78, 0.9);
        cursor: pointer;
      }

      .agent-insight-layout-tool__btn:hover {
        background: rgba(0, 161, 224, 0.12);
        border-color: rgba(0, 161, 224, 0.35);
      }

      .agent-insight-layout-tool__readout {
        margin: 0;
        padding: 8px;
        border-radius: 6px;
        background: rgba(245, 248, 255, 0.95);
        border: 1px solid rgba(95, 107, 142, 0.15);
        font-size: 10px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 120px;
        overflow: auto;
      }

      .agent-insight-layout-tool__hint {
        margin: 0;
        font-size: 10px;
        line-height: 1.35;
        color: rgba(39, 48, 78, 0.72);
      }

      /** First `right-actions` grid cell (FAQs); alignment nudge vs grid column width. */
      .right-actions-slot {
        position: relative;
        display: inline-flex;
        transform: translateX(calc(-9px * var(--header-scale) + var(--right-col-a-offset)));
        justify-self: center;
      }

      .support {
        display: flex;
        align-items: center;
        gap: calc(6px * var(--header-scale));
        font-size: var(--nav-font-size);
        font-weight: 500;
        line-height: 1;
        color: var(--ink-soft);
        white-space: nowrap;
      }

      .support .slack {
        width: calc(14px * var(--header-scale));
        height: calc(14px * var(--header-scale));
      }

      .support-link {
        text-decoration: none;
      }

      .support-link:hover {
        transform: translateY(-1px);
        background: #5a49ba;
        color: #fff;
      }

      .tab-nav {
        display: flex;
        flex-wrap: wrap;
        gap: calc(7px * var(--header-scale));
        padding-left: calc(100px * var(--header-scale));
        flex: 0 1 auto;
      }

      .tab-item {
        position: relative;
        display: inline-flex;
        align-items: flex-start;
      }

      .tab-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border: 1px solid transparent;
        border-radius: var(--pill-radius);
        padding: var(--pill-pad-y) var(--pill-pad-x);
        min-height: var(--pill-min-height);
        min-width: calc(102px * var(--header-scale));
        color: var(--ink-soft);
        background: var(--tab);
        font-size: var(--nav-font-size);
        font-weight: 500;
        line-height: 1;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
      }

      .support-link {
        border: 1px solid transparent;
        border-radius: var(--pill-radius);
        padding: var(--pill-pad-y) var(--pill-pad-x);
        min-height: var(--pill-min-height);
        background: var(--tab);
        color: var(--ink-soft);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: var(--nav-font-size);
        font-weight: 500;
        line-height: 1;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
      }

      .tab-link:hover {
        transform: translateY(-1px);
        background: #5a49ba;
        color: #fff;
      }

      .tab-link:focus-visible,
      .tab-sublink:focus-visible,
      .support-link:focus-visible,
      .metric-float-option:focus-visible,
      .segment-float-select:focus-visible,
      .segment-float-info:focus-visible,
      .deep-dive-btn:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .tab-link.is-active {
        position: relative;
        background: var(--tab-active);
        color: var(--ink);
        border: 1px solid var(--sf-blue);
        font-weight: 600;
        padding-left: var(--pill-pad-x);
        box-shadow:
          0 2px 8px rgba(8, 4, 40, 0.26),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .tab-link[data-tab-group="overview"].is-active {
        background: linear-gradient(180deg, #3a2ba4 0%, #2f1b95 100%);
        border-color: rgba(0, 161, 224, 0.85);
        box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.14);
      }

      .tab-sublink {
        text-decoration: none;
        color: var(--ink-soft);
        font-size: var(--nav-font-size);
        line-height: 1.1;
        border-radius: calc(6px * var(--header-scale));
        padding: calc(6px * var(--header-scale)) calc(8px * var(--header-scale));
        transition: background 120ms ease, color 120ms ease;
      }

      .tab-sublink:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
      }

      .tab-sublink.is-active {
        color: #fff;
        background: rgba(0, 161, 224, 0.25);
      }

      .subnav-row .tab-sublink {
        position: relative;
        z-index: 1;
        font-size: calc(11px * var(--header-scale));
        font-weight: 600;
        padding: calc(5px * var(--header-scale)) calc(8px * var(--header-scale));
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.8);
      }

      .subnav-row .tab-sublink:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .subnav-row .tab-sublink.is-active {
        color: #fff;
        border-color: rgba(0, 161, 224, 0.78);
        background: rgba(0, 161, 224, 0.28);
        box-shadow:
          inset 0 0 0 1px rgba(0, 161, 224, 0.2),
          0 2px 6px rgba(0, 161, 224, 0.2);
      }

      .subnav-row .tab-sublink[hidden] {
        display: none;
      }

      /** Manual data orchestration (not automated); faint magenta in subnav only */
      .subnav-row .tab-sublink.tab-sublink--manual-orchestration {
        color: rgba(238, 200, 248, 0.88);
        border-color: rgba(200, 130, 210, 0.38);
      }

      .subnav-row .tab-sublink.tab-sublink--manual-orchestration:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(190, 130, 205, 0.55);
      }

      .subnav-row .tab-sublink.tab-sublink--manual-orchestration.is-active {
        color: #fff;
        border-color: rgba(218, 150, 245, 0.72);
        background: rgba(170, 70, 195, 0.24);
        box-shadow:
          inset 0 0 0 1px rgba(220, 160, 255, 0.22),
          0 2px 6px rgba(120, 50, 150, 0.22);
      }

      .subnav-row .tab-sublink.tab-sublink--manual-orchestration::after {
        content: "Manual Data Orchestration";
        position: absolute;
        left: 50%;
        top: calc(100% + 6px);
        bottom: auto;
        transform: translateX(-50%);
        width: max-content;
        max-width: min(280px, calc(100vw - 24px));
        padding: calc(6px * var(--header-scale)) calc(10px * var(--header-scale));
        border-radius: calc(6px * var(--header-scale));
        border: 1px solid rgba(188, 130, 200, 0.5);
        background: rgba(22, 20, 26, 0.96);
        color: rgba(255, 255, 255, 0.92);
        font-size: calc(10px * var(--header-scale));
        font-weight: 600;
        letter-spacing: 0.04em;
        line-height: 1.25;
        text-align: center;
        white-space: nowrap;
        z-index: 30;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.12s ease, visibility 0.12s ease;
      }

      .subnav-row .tab-sublink.tab-sublink--manual-orchestration:hover::after,
      .subnav-row .tab-sublink.tab-sublink--manual-orchestration:focus-visible::after {
        opacity: 1;
        visibility: visible;
      }

      .page {
        display: none;
        margin-top: 2px;
        padding: 0;
      }

      .page.is-active {
        display: block;
      }

      .tableau-slot {
        width: min(100%, var(--viz-width));
        margin: 0 auto;
        min-height: var(--viz-default-height);
        border: 0;
        border-radius: 0;
        background: transparent;
        overflow-x: hidden;
        overflow-y: visible;
        display: block;
        border-radius: 10px;
      }

      /** Fixed 1600×2600 Tableau host box (every dashboard, same as Agent Rubric). Narrow viewports scroll horizontally. */
      .page:has([data-tableau-slot] tableau-viz) {
        overflow-x: auto;
      }

      .tableau-slot:has(tableau-viz) {
        width: var(--viz-width);
        min-width: var(--viz-width);
        max-width: var(--viz-width);
        overflow-x: visible;
      }

      .tableau-slot tableau-viz {
        display: block;
        width: var(--viz-width);
        min-width: var(--viz-width);
        max-width: var(--viz-width);
        height: var(--viz-tableau-height);
        min-height: var(--viz-tableau-height);
        box-sizing: border-box;
      }

      .tableau-slot .local-page-frame {
        display: block;
        width: 100%;
        height: var(--viz-default-height);
        min-height: var(--viz-default-height);
        border: 0;
        background: transparent;
        border-radius: 10px;
      }

      /** Flywheel: flush 1600px column — no shell horizontal inset; slot + iframe match Tableau width. */
      .app:has(#engagement-flywheel.is-active) {
        padding-left: 0;
        padding-right: 0;
        max-width: var(--viz-width);
      }

      /** Tighter stack: less air between sticky header and flywheel iframe. */
      .app:has(#engagement-flywheel.is-active) .header-shell {
        padding-bottom: 2px;
      }

      #engagement-flywheel.is-active {
        margin-top: 0;
      }

      #engagement-flywheel.is-active .tableau-slot {
        width: var(--viz-width);
        min-width: var(--viz-width);
        max-width: var(--viz-width);
        margin: 0;
        border-radius: 0;
      }

      #engagement-flywheel.is-active .tableau-slot .local-page-frame {
        width: var(--viz-width);
        min-width: var(--viz-width);
        max-width: var(--viz-width);
        border-radius: 0;
      }

      .tableau-slot.overlays-pending .metric-float-panel,
      .tableau-slot.overlays-pending .segment-float-panel,
      .tableau-slot.overlays-pending .chemistry-sig-float-panel,
      .tableau-slot.overlays-pending .deep-dive-btn,
      .tableau-slot.overlays-pending .agent-summary-rail,
      .tableau-slot.overlays-pending .agent-insight-layout-tool {
        opacity: 0;
        pointer-events: none;
      }

      .metric-float-panel,
      .segment-float-panel,
      .chemistry-sig-float-panel,
      .deep-dive-btn,
      .agent-summary-rail,
      .agent-insight-layout-tool {
        transition: opacity 170ms ease;
      }

      .deep-dive-btn {
        position: absolute;
        left: 18px;
        right: auto;
        top: 168px;
        z-index: 8;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: fit-content;
        min-width: 0;
        white-space: nowrap;
        box-sizing: border-box;
        border: 1px solid rgba(185, 206, 245, 0.78);
        border-radius: calc(10px * var(--header-scale));
        background: linear-gradient(90deg, rgba(103, 89, 224, 0.96) 0%, rgba(81, 116, 223, 0.95) 54%, rgba(69, 151, 229, 0.94) 100%);
        color: #fff;
        font-size: calc(12px * var(--header-scale));
        font-weight: 400;
        line-height: 1.2;
        letter-spacing: 0;
        text-shadow: 0 1px 1px rgba(22, 19, 84, 0.36);
        padding: calc(6px * var(--header-scale)) calc(10px * var(--header-scale));
        cursor: pointer;
        box-shadow:
          0 2px 6px rgba(44, 66, 170, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
        transition: background 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      }

      .deep-dive-btn:hover {
        background: linear-gradient(90deg, rgba(111, 97, 232, 0.97) 0%, rgba(89, 125, 231, 0.96) 54%, rgba(76, 160, 236, 0.95) 100%);
        border-color: rgba(203, 221, 251, 0.9);
        box-shadow:
          0 3px 8px rgba(43, 67, 177, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        transform: translateY(-1px);
      }

      .deep-dive-btn.deep-dive-btn--manual-orchestration {
        background: linear-gradient(90deg, rgba(93, 83, 219, 0.96) 0%, rgba(76, 112, 220, 0.95) 56%, rgba(66, 146, 225, 0.94) 100%);
        border-color: rgba(183, 206, 246, 0.82);
        box-shadow:
          0 2px 6px rgba(43, 66, 170, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }

      .deep-dive-btn.deep-dive-btn--manual-orchestration:hover {
        background: linear-gradient(90deg, rgba(101, 92, 227, 0.97) 0%, rgba(84, 122, 229, 0.96) 56%, rgba(73, 156, 234, 0.95) 100%);
        border-color: rgba(200, 220, 251, 0.9);
        box-shadow:
          0 3px 8px rgba(43, 66, 178, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }

      .deep-dive-btn:active,
      .metric-float-option:active {
        transform: translateY(0);
      }

      .placeholder {
        padding: 20px;
        text-align: center;
        color: #243041;
        line-height: 1.5;
        font-size: 15px;

    <script>
      // Tableau: view slug relative to TABLEAU_VIEWS_BASE, or a full https://... embed URL.
      const TABLEAU_VIEWS_BASE =
        "https://prod-uswest-c.online.tableau.com/#/site/salesforce/views/C0Observability/";
      function resolveTableauEmbedSrc(entry) {
        if (entry == null || !String(entry).trim()) return "";
        const s = String(entry).trim();
        if (/^https?:\/\//i.test(s)) return s;
        return TABLEAU_VIEWS_BASE + s.replace(/^\/+/, "");
      }

      const tableauEmbeds = {
        agentRubric: "ASR_Agent_Metrics",
        overviewMetricChemistry: "ASR_Agent_Chemistry",
        overviewTopicDiagnostics: "ASR_Topic_Diagnosis",
        efficacyResponseQuality: "Efficacy_Response_Quality",
        efficacyUserSentiment: "Efficacy_User_Sentiment",
        efficacyTopicCollision: "Efficacy_Topic_Collision",
        performanceLatency: "Performance_Latency",
        engagementFlywheel: "",
        engagementKeyMetrics: "Engagement_Key_Metrics",
        businessValueTimeSavings: "BizVal_Time_Savings",
        innovationLabEmailCoachApi: "",
      };

      /** Which host-page overlays mount after viz firstinteractive (per data-embed-key). */
      const customOverlaysByEmbedKey = {
        agentRubric: {
          metricPickers: true,
          segmentFilter: true,
          deepDiveButtons: true,
        },
        overviewMetricChemistry: { segmentFilter: true, chemistrySignificance: true },
        overviewTopicDiagnostics: { segmentFilter: true, chemistrySignificance: true },
      };

      const localPageEmbeds = {
        innovationLabEmailCoachApi: ["./email_coach_v34_scrubbed.html", "./email_coach_v34.html"],
        engagementFlywheel: ["./flywheel-v3.html"],
      };

      // Viz height. C0Observability dashboards: 1600×2600 design; slot width matches Rubric (min(100%, 1600)).
      const tableauHeights = {
        /** Extra host height so insight narrative cards are not forced into an internal scroll region. */
        agentRubric: 3000,
        overviewMetricChemistry: 2600,
        overviewTopicDiagnostics: 2600,
        efficacyResponseQuality: 2600,
        efficacyUserSentiment: 2600,
        efficacyTopicCollision: 2600,
        performanceLatency: 2600,
        engagementFlywheel: 2800,
        engagementKeyMetrics: 2600,
        businessValueTimeSavings: 2600,
        innovationLabEmailCoachApi: 3600,
      };

      const TAB_STORAGE_KEY = "c0-observability:last-tab";
      const AGENT_NAME_PARAM = "agent_name_p";
      const CHEMISTRY_SIG_PARAM = "chemistry_sig_p";
      const CHEMISTRY_SIG_OPTIONS = [
        { value: 1, label: "Statistically Significant Only" },
        { value: 2, label: "All" },
      ];
      let chemistrySigSelection = 1;
      /** Rubric + Metric Chemistry both read agent options from this worksheet (`agent_name_p`). */
      const AGENT_NAME_HELPER_SHEET_DEFAULT = "agent_name_p";
      const AGENT_NAME_HELPER_SHEET_OVERRIDES = {};
      function getAgentNameHelperSheet(embedKey) {
        return AGENT_NAME_HELPER_SHEET_OVERRIDES[embedKey] || AGENT_NAME_HELPER_SHEET_DEFAULT;
      }
      const AGENT_NAME_DEFAULT = "Sales Agent";
      /** Optional JSON keyed by exact agent name (`{ "Sales Agent": { "good": [], "bad": [] } }`). */
      const AGENT_SUMMARY_JSON_URL = "./c0_agent_summaries.json";
      const AGENT_SUMMARY_HOVER_JSON_URL = "./c0_agent_summaries_hover.json";
      /**
       * Full catalog is also embedded in `#c0-agent-summaries-bundled` so `file://` and failed fetch
       * still resolve every agent key. Network JSON merges on top when fetch succeeds.
       */
      /**
       * Used when bundled DOM JSON is missing or a name is still absent after merge.
       * Refresh via MCP + paste; keys must match Tableau agent_name_p strings.
       */
      const AGENT_SUMMARY_FALLBACK = {
        "Sales Agent": {
          good: [
            "Rubric (vs prior run): lower negative response % and reprompt rate; higher weekly acquisition, engagement depth, and one-week retention; answer relevancy up slightly; planner duration down; more sessions.",
            "Flywheel (healthy slice): strong 1-day / WoW / 28-day retention and visible multi-week habit among week-1 users when volume supports it.",
          ],
          bad: [
            "Rubric: MAU (28d) and habit metric down vs prior run; positive response % and conciseness eased; action duration up.",
            "Flywheel: engagement depth below target; new-user share of WAU can trail portfolio; steep power vs casual usage gap.",
          ],
          issueAttention: [
            "Issues: agent-level PM signal centers trust / policy-step failures—useful for backlog framing.",
            "Issues: many topic rows lack statistically reliable error-vs-healthy separation; tiny org slices can show empty strengths / harsh thresholds.",
          ],
        },
      };
      let agentSummaryRemote = null;
      let agentSummaryRemotePromise = null;
      let agentHoverRemote = null;
      let agentHoverRemotePromise = null;

      function readBundledAgentSummaryCatalogFromDom() {
        try {
          const el = document.getElementById("c0-agent-summaries-bundled");
          const raw = el && el.textContent ? String(el.textContent).trim() : "";
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch (_e) {
          return {};
        }
      }

      function readBundledAgentHoverCatalogFromDom() {
        try {
          const el = document.getElementById("c0-agent-hover-bundled");
          const raw = el && el.textContent ? String(el.textContent).trim() : "";
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch (_e) {
          return {};
        }
      }

      async function loadAgentSummaryRemote() {
        if (agentSummaryRemote) return agentSummaryRemote;
        if (agentSummaryRemotePromise) return agentSummaryRemotePromise;
        agentSummaryRemotePromise = fetch(AGENT_SUMMARY_JSON_URL, { cache: "no-store" })
          .then(async (r) => {
            if (!r.ok) return {};
            try {
              return await r.json();
            } catch (_parse) {
              return {};
            }
          })
          .catch(() => ({}))
          .then((fetched) => {
            const dom = readBundledAgentSummaryCatalogFromDom();
            const net =
              fetched && typeof fetched === "object" && !Array.isArray(fetched) ? fetched : {};
            const hasNet = Object.keys(net).length > 0;
            agentSummaryRemote = hasNet ? { ...dom, ...net } : { ...dom };
            return agentSummaryRemote;
          });
        return agentSummaryRemotePromise;
      }

      async function loadAgentHoverRemote() {
        if (agentHoverRemote) return agentHoverRemote;
        if (agentHoverRemotePromise) return agentHoverRemotePromise;
        agentHoverRemotePromise = fetch(AGENT_SUMMARY_HOVER_JSON_URL, { cache: "no-store" })
          .then(async (r) => {
            if (!r.ok) return {};
            try {
              return await r.json();
            } catch (_parse) {
              return {};
            }
          })
          .catch(() => ({}))
          .then((fetched) => {
            const dom = readBundledAgentHoverCatalogFromDom();
            const net =
              fetched && typeof fetched === "object" && !Array.isArray(fetched) ? fetched : {};
            const hasNet = Object.keys(net).length > 0;
            agentHoverRemote = hasNet ? { ...dom, ...net } : { ...dom };
            return agentHoverRemote;
          });
        return agentHoverRemotePromise;
      }

      function getAgentHoverPayload(agentName) {
        const key = String(agentName == null ? "" : agentName).trim() || AGENT_NAME_DEFAULT;
        const remote = agentHoverRemote && typeof agentHoverRemote === "object" ? agentHoverRemote[key] : null;
        if (remote && typeof remote === "object") {
          return {
            keyStrengthHover: String(remote.keyStrengthHover == null ? "" : remote.keyStrengthHover).trim(),
            attentionNeededHover: String(remote.attentionNeededHover == null ? "" : remote.attentionNeededHover).trim(),
          };
        }
        return { keyStrengthHover: "", attentionNeededHover: "" };
      }

      /** Styled hover popover only (no native `title` — avoids duplicate grey browser tooltip). */
      function attachNarrativeCardTooltip(cardEl, hoverText) {
        const text = String(hoverText == null ? "" : hoverText).trim();
        if (!cardEl || !text) return;
        cardEl.setAttribute("data-has-hover", "true");
        cardEl.removeAttribute("title");
        cardEl.setAttribute("tabindex", "0");
        attachNarrativeCardTooltip._tipSeq = (attachNarrativeCardTooltip._tipSeq || 0) + 1;
        const tipId = "c0-agent-narrative-tip-" + attachNarrativeCardTooltip._tipSeq;
        const tip = document.createElement("div");
        tip.id = tipId;
        tip.className = "agent-narrative-card__tooltip";
        tip.setAttribute("role", "tooltip");
        tip.textContent = text;
        cardEl.setAttribute("aria-describedby", tipId);
        cardEl.appendChild(tip);
      }

      function getAgentSummaryPayload(agentName) {
        const key = String(agentName == null ? "" : agentName).trim() || AGENT_NAME_DEFAULT;
        const remote = agentSummaryRemote && typeof agentSummaryRemote === "object" ? agentSummaryRemote[key] : null;
        if (
          remote &&
          (Array.isArray(remote.good) ||
            Array.isArray(remote.bad) ||
            Array.isArray(remote.issueAttention))
        ) {
          return {
            good: Array.isArray(remote.good) ? remote.good : [],
            bad: Array.isArray(remote.bad) ? remote.bad : [],
            issueAttention: Array.isArray(remote.issueAttention) ? remote.issueAttention : [],
            source: "json",
          };
        }
        const fb = AGENT_SUMMARY_FALLBACK[key];
        if (fb) {
          return {
            good: fb.good || [],
            bad: fb.bad || [],
            issueAttention: Array.isArray(fb.issueAttention) ? fb.issueAttention : [],
            source: "embedded",
          };
        }
        return { good: [], bad: [], issueAttention: [], source: "none" };
      }

      /**
       * Strengths card = non–issue-prefixed `good` lines.
       * Attention card = `issueAttention` (issue / diagnosis MCP) + any `Issues:` lines from good/bad + remaining `bad` lines.
       */
      function computeStrengthAndAttentionLists(payload) {
        const explicitIssue = Array.isArray(payload.issueAttention)
          ? payload.issueAttention.map((t) => String(t == null ? "" : t).trim()).filter((s) => s.length > 0)
          : [];
        const splitIssue = (arr) => {
          const issue = [];
          const rest = [];
          (Array.isArray(arr) ? arr : []).forEach((raw) => {
            const s = String(raw == null ? "" : raw).trim();
            if (!s) return;
            if (/^issues?:/i.test(s)) issue.push(s);
            else rest.push(s);
          });
          return { issue, rest };
        };
        const g = splitIssue(payload.good);
        const b = splitIssue(payload.bad);
        const strengths = g.rest;
        const attention = explicitIssue.concat(g.issue, b.issue, b.rest);
        return { strengths, attention };
      }

      /** Matches default rows in c0_agent_summaries.json for agents without MCP paste yet. */
      function isGenericMcpPendingLine(text) {
        const s = String(text == null ? "" : text).trim();
        if (!s) return false;
        return /^no mcp-generated bullets in this bundle yet/i.test(s);
      }

      /** Same placeholder copied into good + bad yields identical strengths and attention — show one card instead. */
      function shouldCollapseToPendingOnlyCard(strengths, attention) {
        if (!Array.isArray(strengths) || !Array.isArray(attention)) return false;
        if (strengths.length !== 1 || attention.length !== 1) return false;
        const a = String(strengths[0] == null ? "" : strengths[0]).trim();
        const b = String(attention[0] == null ? "" : attention[0]).trim();
        return a.length > 0 && a === b && isGenericMcpPendingLine(a);
      }

      function fillAgentNarrativeCard(cardEl, items, emptyPhrase, cardKind) {
        cardEl.innerHTML = "";
        const title = document.createElement("div");
        title.className = "agent-narrative-card__title agent-narrative-card__title--" + (cardKind === "attention" ? "attention" : "strengths");
        if (cardKind === "attention") {
          const bang = document.createElement("span");
          bang.className = "agent-narrative-card__title-ico agent-narrative-card__title-ico--bang";
          bang.setAttribute("aria-hidden", "true");
          bang.textContent = "!";
          const lbl = document.createElement("span");
          lbl.textContent = "Needs Attention";
          title.appendChild(bang);
          title.appendChild(lbl);
        } else {
          const rocket = document.createElement("span");
          rocket.className = "agent-narrative-card__title-ico";
          rocket.setAttribute("aria-hidden", "true");
          rocket.textContent = "🚀";
          const lbl = document.createElement("span");
          lbl.textContent = "Key Strengths";
          title.appendChild(rocket);
          title.appendChild(lbl);
        }
        cardEl.appendChild(title);

        const list = Array.isArray(items) ? items.map((t) => String(t == null ? "" : t).trim()).filter((s) => s.length > 0) : [];
        const ul = document.createElement("ul");
        if (!list.length) {
          cardEl.classList.add("empty");
          const li = document.createElement("li");
          li.textContent = emptyPhrase || "No bullets yet for this agent.";
          ul.appendChild(li);
        } else {
          cardEl.classList.remove("empty");
          list.forEach((text) => {
            const li = document.createElement("li");
            li.textContent = text || "—";
            ul.appendChild(li);
          });
        }
        cardEl.appendChild(ul);
      }

      function buildAgentSummaryRailHeader() {
        const header = document.createElement("div");
        header.className = "agent-summary-rail__header";
        const iconWrap = document.createElement("span");
        iconWrap.className = "agent-summary-rail__icon-wrap";
        const icon = document.createElement("img");
        icon.className = "agent-summary-rail__icon";
        icon.src = "./llm-icon.png";
        icon.alt = "";
        icon.decoding = "async";
        icon.setAttribute("aria-hidden", "true");
        iconWrap.appendChild(icon);
        const titleGroup = document.createElement("div");
        titleGroup.className = "agent-summary-rail__title-group";
        const heading = document.createElement("div");
        heading.className = "agent-summary-rail__heading";
        heading.id = "c0-agent-summary-rail-heading";
        heading.textContent = "AI-Curated Performance Narrative";
        titleGroup.appendChild(heading);
        header.appendChild(iconWrap);
        header.appendChild(titleGroup);
        return header;
      }

      function mountAgentSummaryRailShell(el, bodyNodes) {
        el.innerHTML = "";
        const shell = document.createElement("div");
        shell.className = "agent-summary-rail__shell";
        shell.setAttribute("role", "region");
        shell.setAttribute("aria-labelledby", "c0-agent-summary-rail-heading");
        shell.appendChild(buildAgentSummaryRailHeader());
        const body = document.createElement("div");
        body.className = "agent-summary-rail__body";
        bodyNodes.forEach((node) => body.appendChild(node));
        shell.appendChild(body);
        el.appendChild(shell);
      }

      async function refreshAgentSummaryBanner(slot, embedKey, agentName) {
        if (embedKey !== "agentRubric" || !slot) return;
        const el = slot.querySelector(".agent-summary-rail");
        if (!el) return;
        const name = String(agentName == null ? "" : agentName).trim() || AGENT_NAME_DEFAULT;
        const loading = document.createElement("p");
        loading.className = "agent-summary-rail__state";
        loading.textContent = "Loading snapshot for " + name + "…";
        mountAgentSummaryRailShell(el, [loading]);
        try {
          await Promise.all([loadAgentSummaryRemote(), loadAgentHoverRemote()]);
        } catch (_e) {
          /* keep embedded fallback */
        }

      function normalizeText(value) {
        return (value || "").trim().toLowerCase();
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }


      function getSheetName(sheet) {
        return (sheet && (sheet.name || (typeof sheet.getName === "function" ? sheet.getName() : ""))) || "";
      }

      function getActiveWorksheets(vizElement) {
        const activeSheet = vizElement?.workbook?.activeSheet;
        if (!activeSheet) return [];
        if (Array.isArray(activeSheet.worksheets) && activeSheet.worksheets.length) {
          return activeSheet.worksheets;
        }
        return [activeSheet];
      }

      function getSummaryRows(summaryData) {
        if (summaryData && Array.isArray(summaryData.data)) return summaryData.data;
        if (summaryData && typeof summaryData.getData === "function") {
          try {
            const data = summaryData.getData();
            return Array.isArray(data) ? data : [];
          } catch (_err) {
            return [];
          }
        }
        return [];
      }

      function getCellText(cell) {
        if (cell == null) return "";
        if (typeof cell === "string" || typeof cell === "number" || typeof cell === "boolean") return String(cell).trim();
        const candidate = cell.formattedValue ?? cell.value ?? cell.nativeValue ?? "";
        return String(candidate).trim();
      }

      async function fetchAgentNameParameterOptions(vizElement, helperSheetName) {
        const sheetName = helperSheetName || AGENT_NAME_HELPER_SHEET_DEFAULT;
        const worksheets = getActiveWorksheets(vizElement);
        const helper = worksheets.find(
          (sheet) => normalizeText(getSheetName(sheet)) === normalizeText(sheetName)
        );
        if (!helper || typeof helper.getSummaryDataAsync !== "function") return [];

        let summary;
        try {
          summary = await helper.getSummaryDataAsync({ maxRows: 10000 });
        } catch (_errWithOpts) {
          try {
            summary = await helper.getSummaryDataAsync();
          } catch (_errNoOpts) {
            return [];
          }
        }

        const rows = getSummaryRows(summary);
        const ordered = [];
        const seen = new Set();
        for (const row of rows) {
          const value = getCellText(Array.isArray(row) ? row[0] : row);
          if (!value.length || seen.has(value)) continue;
          seen.add(value);
          ordered.push(value);
        }
        return ordered;
      }

      async function applyAgentNameParameterToViz(vizElement, paramValue) {
        if (!vizElement) return false;
        const valueToApply = String(paramValue == null ? "" : paramValue).trim() || AGENT_NAME_DEFAULT;

        async function tryWorkbook(wb) {
          if (!wb || typeof wb.changeParameterValueAsync !== "function") return false;
          await wb.changeParameterValueAsync(AGENT_NAME_PARAM, valueToApply);
          return true;
        }

        async function tryViz(viz) {
          if (!viz || typeof viz.changeParameterValueAsync !== "function") return false;
          await viz.changeParameterValueAsync(AGENT_NAME_PARAM, valueToApply);
          return true;
        }

        try {
          if (await tryWorkbook(vizElement.workbook)) return true;
          if (await tryViz(vizElement)) return true;
        } catch (err) {
          console.warn("Unable to apply Tableau parameter", AGENT_NAME_PARAM, err);
        }
        return false;
      }

      function setQuickViewGroup(group) {
        const groupChanged = currentQuickGroup && currentQuickGroup !== group;
        if (groupChanged && subnavRow) {
          subnavRow.classList.add("is-switching");
          if (subnavSwitchTimer) window.clearTimeout(subnavSwitchTimer);
          subnavSwitchTimer = window.setTimeout(() => {
            subnavRow.classList.remove("is-switching");
          }, 170);
        }
        quickViewLinks.forEach((link) => {
          link.hidden = link.getAttribute("data-quick-group") !== group;
        });

        /** After `hidden` toggles, layout must settle before measuring row width for `--subnav-offset`. */
        requestAnimationFrame(() => {
          positionQuickViewsUnderParent(group);
        });

      function positionQuickViewsUnderParent(group) {
        if (!subnavRow || !headerEl) return;
        const parentLink = parentTabLinks.find((link) => link.getAttribute("data-tab-group") === group);
        if (!parentLink) return;
        const headerRect = headerEl.getBoundingClientRect();
        const parentRect = parentLink.getBoundingClientRect();
        const rowRect = subnavRow.getBoundingClientRect();
        const rowWidth = rowRect.width || subnavRow.offsetWidth || 0;
        const inset = 8;
        const rawOffset = parentRect.left - headerRect.left;
        const maxOffset = Math.max(inset, headerRect.width - rowWidth - inset);
        const clampedOffset = clamp(rawOffset, inset, maxOffset);
        subnavRow.style.setProperty("--subnav-offset", clampedOffset.toFixed(1) + "px");
      }

      function normalizeParamName(name) {
        return String(name || "")
          .trim()
          .toLowerCase();
      }

      function findWorkbookParameter(parameters, paramName) {
        if (!Array.isArray(parameters)) return null;
        const want = normalizeParamName(paramName);
        return parameters.find((p) => p && normalizeParamName(p.name) === want) || null;
      }

      function parameterListValues(param) {
        if (!param) return null;
        const av = param.allowableValues;
        if (Array.isArray(av)) return av;
        if (av && Array.isArray(av.values)) return av.values;
        if (av && Array.isArray(av.allowableValues)) return av.allowableValues;
        if (param.domain && Array.isArray(param.domain.values)) return param.domain.values;
        return null;
      }

      /** List-type parameters: workbook list order — option value v uses list[v - 1] when present. */
      function listParameterValueAtOptionIndex(param, optionValue) {
        const list = parameterListValues(param);
        if (!Array.isArray(list) || !list.length) return null;
        const i = Number(optionValue) - 1;
        if (i < 0 || i >= list.length) return null;
        const item = list[i];
        if (item == null) return null;
        if (typeof item === "string" || typeof item === "number" || typeof item === "boolean") return item;
        if (item.value !== undefined && item.value !== null) return item.value;
        if (item.nativeValue !== undefined && item.nativeValue !== null) return item.nativeValue;
        return null;
      }

      function collectListParameterCandidateValues(paramObj, metricNum, fromAllowable, label) {
        const candidateValues = [];
        const push = (v) => {
          if (v === undefined || v === null) return;
          candidateValues.push(v);
        };

        if (fromAllowable !== null && fromAllowable !== undefined) push(fromAllowable);

        const list = parameterListValues(paramObj);
        const idx = Number(metricNum) - 1;
        if (Array.isArray(list) && idx >= 0 && idx < list.length) {
          const item = list[idx];
          if (item != null) {
            if (typeof item === "string" || typeof item === "number" || typeof item === "boolean") {
              push(item);
              push(String(item));
            } else if (typeof item === "object") {
              if (item.value !== undefined && item.value !== null) {
                push(item.value);
                push(String(item.value));
              }
              if (item.nativeValue !== undefined && item.nativeValue !== null) push(item.nativeValue);
              if (item.formattedValue !== undefined && item.formattedValue !== null) {
                push(item.formattedValue);
              }
            }
          }
        }

        push(Number(metricNum));
        push(String(metricNum));
        if (label) push(label);
        return candidateValues;
      }

      async function applyTableauListStyleParameter(vizElement, paramName, selectedValue, optionsList) {
        if (!vizElement) return false;

        const wb = vizElement.workbook;
        const metricNum = Number(selectedValue);
        const pickedOption = optionsList.find((o) => o.value === metricNum);
        const label = pickedOption ? pickedOption.label : "";

        let workbookParameters = null;
        if (wb && typeof wb.getParametersAsync === "function") {
          try {
            workbookParameters = await wb.getParametersAsync();
          } catch (err) {
            console.warn("applyTableauListStyleParameter getParametersAsync", paramName, err);
          }
        }

        const paramObj = workbookParameters ? findWorkbookParameter(workbookParameters, paramName) : null;
        const fromAllowable = listParameterValueAtOptionIndex(paramObj, metricNum);
        const apiName = paramObj && paramObj.name ? paramObj.name : paramName;
        const candidateValues = collectListParameterCandidateValues(
          paramObj,
          metricNum,
          fromAllowable,
          label
        );

        if (paramObj && typeof paramObj.changeValueAsync === "function") {
          for (const value of candidateValues) {
            try {
              await paramObj.changeValueAsync(value);
              return true;
            } catch (_e) {
              /* try next shape */
            }
          }
        }

        if (wb && typeof wb.changeParameterValueAsync === "function") {
          for (const value of candidateValues) {
            try {
              await wb.changeParameterValueAsync(apiName, value);
              return true;
            } catch (_e) {
              /* try next */
            }
          }
        }

        if (typeof vizElement.changeParameterValueAsync === "function") {
          for (const value of candidateValues) {
            try {
              await vizElement.changeParameterValueAsync(apiName, value);
              return true;
            } catch (_e) {
              /* try next */
            }
          }
        }

        if (apiName !== paramName && wb && typeof wb.changeParameterValueAsync === "function") {
          for (const value of candidateValues) {
            try {
              await wb.changeParameterValueAsync(paramName, value);
              return true;
            } catch (_e) {
              /* try next */
            }
          }
        }

        if (apiName !== paramName && typeof vizElement.changeParameterValueAsync === "function") {
          for (const value of candidateValues) {
            try {
              await vizElement.changeParameterValueAsync(paramName, value);
              return true;
            } catch (_e) {
              /* try next */
            }
          }
        }

        console.warn("Unable to apply Tableau parameter", paramName, {
          selected: metricNum,
          label,
          apiName,
          tried: candidateValues,
          parameterFound: !!paramObj,
        });
        return false;
      }

      async function applyMetricListParameterByKey(vizElement, configKey) {
        const def = metricListParameterOverlayConfig.find((item) => item.key === configKey);
        if (!def) return false;

      function readChemistrySigLayout(embedKey) {
        const prof = chemistrySigLayoutProfile(embedKey);
        if (!prof.layoutToolEnabled) {
          return { ...prof.defaults };
        }
        try {
          const raw = localStorage.getItem(prof.storageKey);
          if (!raw) return { ...prof.defaults };
          const parsed = JSON.parse(raw);
          return {
            left: Number.isFinite(Number(parsed.left)) ? Number(parsed.left) : prof.defaults.left,
            top: Number.isFinite(Number(parsed.top)) ? Number(parsed.top) : prof.defaults.top,
          };
        } catch (_err) {
          return { ...prof.defaults };
        }
      }

      function writeChemistrySigLayout(embedKey, layout) {
        const prof = chemistrySigLayoutProfile(embedKey);
        try {
          localStorage.setItem(prof.storageKey, JSON.stringify(layout));
        } catch (_err) {
          /* ignore */
        }
      }
